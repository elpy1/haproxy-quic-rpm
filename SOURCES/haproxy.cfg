#---------------------------------------------------------------------
# Packaged baseline configuration. It keeps HAProxy runnable under systemd,
# exposes only local stats/admin interfaces by default, and leaves
# application listeners/backends to this file or /etc/haproxy/conf.d/*.cfg.
#
# See the full configuration options online.
#
#   https://www.haproxy.org/download/3.2/doc/configuration.txt
#
#---------------------------------------------------------------------

#---------------------------------------------------------------------
# Global settings
#---------------------------------------------------------------------
global
    # The packaged systemd unit runs HAProxy in the foreground, so logs are
    # sent to journald by default. Use "journalctl -u haproxy" to inspect them.
    log         stdout format short daemon

    chroot      /var/lib/haproxy
    maxconn     4000
    user        haproxy
    group       haproxy

    # Admin socket for local maintenance and seamless reloads.
    stats socket /run/haproxy/admin.sock user haproxy group haproxy mode 660 level admin expose-fd listeners
    stats timeout 30s

#---------------------------------------------------------------------
# common defaults that all the 'listen' and 'backend' sections will
# use if not designated in their block
#---------------------------------------------------------------------
defaults
    mode                    http
    log                     global
    option                  httplog
    option                  dontlognull
    option http-server-close
    timeout http-request    10s
    timeout connect         10s
    timeout client          1m
    timeout server          1m
    timeout http-keep-alive 10s
    timeout check           10s
    maxconn                 3000

# Place your frontends, backends, and listen sections below or in
# /etc/haproxy/conf.d/*.cfg. The packaged systemd unit loads this file first and
# then all *.cfg snippets in lexical order.

#---------------------------------------------------------------------
# Local statistics page
#---------------------------------------------------------------------
listen stats
    bind 127.0.0.1:9000
    mode http
    stats enable
    stats realm haproxy\ statistics
    stats uri /stats
    stats refresh 10s
